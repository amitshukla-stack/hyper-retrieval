name: HyperRetrieval Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

env:
  ARTIFACT_DIR: ${{ vars.HYPERRETRIEVAL_ARTIFACT_DIR || '.hyperretrieval/artifacts' }}

jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout HyperRetrieval
        if: ${{ github.repository != (vars.HYPERRETRIEVAL_REPO || 'amitshukla-stack/hyper-retrieval') }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HYPERRETRIEVAL_REPO || 'amitshukla-stack/hyper-retrieval' }}
          path: .hyperretrieval
          token: ${{ secrets.HYPERRETRIEVAL_TOKEN || github.token }}

      - name: Self-reference symlink
        if: ${{ github.repository == (vars.HYPERRETRIEVAL_REPO || 'amitshukla-stack/hyper-retrieval') }}
        run: ln -s "$GITHUB_WORKSPACE" .hyperretrieval

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install networkx lancedb pyyaml pyarrow

      - name: Download artifacts
        if: ${{ vars.ARTIFACT_DOWNLOAD_URL != '' }}
        run: |
          mkdir -p ${{ env.ARTIFACT_DIR }}
          curl -sL "${{ vars.ARTIFACT_DOWNLOAD_URL }}" | tar -xz -C ${{ env.ARTIFACT_DIR }}

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$FILES" | wc -w)" >> "$GITHUB_OUTPUT"

      - name: Run Guardian analysis
        id: guardian
        continue-on-error: true
        run: |
          # Auto-detect rules file (repo root or artifact dir)
          RULES_ARG=""
          if [ -f "guardian_rules.yaml" ]; then
            RULES_ARG="--rules guardian_rules.yaml"
          elif [ -f "${{ env.ARTIFACT_DIR }}/guardian_rules.yaml" ]; then
            RULES_ARG="--rules ${{ env.ARTIFACT_DIR }}/guardian_rules.yaml"
          fi

          REPORT=$(python3 .hyperretrieval/apps/cli/pr_analyzer.py \
            --mode guardian \
            --artifact-dir "${{ env.ARTIFACT_DIR }}" \
            $RULES_ARG \
            --files ${{ steps.changed.outputs.files }} \
            2>/dev/null)

          # Save report for comment step
          echo "$REPORT" > /tmp/guardian_report.md

          # Also generate JSON for machine parsing
          python3 .hyperretrieval/apps/cli/pr_analyzer.py \
            --mode guardian \
            --format json \
            --artifact-dir "${{ env.ARTIFACT_DIR }}" \
            --files ${{ steps.changed.outputs.files }} \
            2>/dev/null > /tmp/guardian_report.json || true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/guardian_report.md', 'utf8');

            if (!report.trim()) {
              console.log('No Guardian report generated (no modules resolved)');
              return;
            }

            const body = `### HyperRetrieval Guardian\n\n${report}\n\n---\n_Powered by [HyperRetrieval](https://github.com/amitshukla-stack/hyper-retrieval) Guardian Mode_`;

            // Find existing Guardian comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('HyperRetrieval Guardian') &&
              c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing Guardian comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new Guardian comment');
            }

      - name: Check verdict
        if: ${{ vars.GUARDIAN_BLOCKING == 'true' }}
        run: |
          if [ -f /tmp/guardian_report.json ]; then
            python3 -c "
          import json, sys, os
          d = json.load(open('/tmp/guardian_report.json'))
          status = d.get('verdict', {}).get('status', 'PASS')
          risk_score = d.get('risk', {}).get('risk_score', 0)
          threshold = int(os.environ.get('RISK_THRESHOLD', '0'))

          if status == 'FAIL':
              print(f'::error::Guardian verdict: FAIL — PR is likely incomplete')
              sys.exit(1)
          if threshold > 0 and risk_score >= threshold:
              print(f'::error::Risk score {risk_score}/100 exceeds threshold {threshold}')
              sys.exit(1)
          print(f'Guardian: {status}, Risk: {risk_score}/100')
          "
          fi
        env:
          RISK_THRESHOLD: ${{ vars.GUARDIAN_RISK_THRESHOLD || '0' }}
