# config.yaml — codebase-intelligence engine configuration
#
# Copy this to config.yaml and fill in your values.
# Pass it to any entry point:
#   python3 mcp_server.py --config /path/to/config.yaml
#   python3 pr_analyzer.py --config config.yaml --files src/foo.py

# ── LLM (any OpenAI-compatible API) ──────────────────────────────────────────
llm:
  api_key:  "${LLM_API_KEY}"         # env var reference or literal key
  base_url: "${LLM_BASE_URL}"
  model:    "${LLM_MODEL}"          # any OpenAI-compatible model

  # Tested with: reasoning-large-model, any OpenAI-compatible endpoint
  # Use the most capable model you have access to — answer quality scales with LLM quality.
  # Example:
  # base_url: "https://api.openai.com/v1"
  # model:    "${LLM_MODEL}"

# ── Embedding ─────────────────────────────────────────────────────────────────
# All servers connect to the embed_server via server_url — never load models directly.
# Start embed_server.py first, then set EMBED_SERVER_URL in all other processes.
embed:
  server_url: "http://localhost:8001"   # set EMBED_SERVER_URL to this value

  # ── Choose ONE provider for embed_server.py ──────────────────────────────
  #
  # IMPORTANT: embedding dimension varies by provider.
  # If you change provider, you must re-run build/03_embed.py to rebuild vectors.lance.
  #
  # Provider   Default model               Dim   GPU needed
  # ---------- --------------------------- ----- ----------
  # local       qwen3-embed-8b              4096  Yes (~6GB)
  # openai      (see provider docs)         varies  No
  # cohere      (see provider docs)         varies  No
  # voyage      voyage-code-3               1024  No
  # jina        jina-embeddings-v3          1024  No
  # ollama      nomic-embed-text             768  No (local CPU)
  # ollama      mxbai-embed-large           1024  No (local CPU)
  #
  # Tested with: local/qwen3-embed-8b, openai/text-embedding-3-large, voyage/voyage-code-3
  # For best results with code search, use a model trained on or fine-tuned for code.
  # If you have access to a higher-dimension model, prefer it — retrieval quality scales with dim.
  #
  provider: "local"                     # set EMBED_PROVIDER env var to this value
  model: ""                             # set EMBED_PROVIDER_MODEL to override default

  # Provider API keys (set as env vars — do not commit real keys)
  # openai_api_key:  "${OPENAI_API_KEY}"
  # cohere_api_key:  "${COHERE_API_KEY}"
  # voyage_api_key:  "${VOYAGE_API_KEY}"
  # jina_api_key:    "${JINA_API_KEY}"
  # ollama_base_url: "http://localhost:11434"

  # Custom instruction prefix (used only for local Qwen3 — providers use native query types)
  instruction: "Instruct: Represent this code module for finding semantically similar components. Query: "

# ── Artifact directory ────────────────────────────────────────────────────────
# Where to find: graph_with_summaries.json, vectors.lance, output/
artifact_dir: "/path/to/your/workspace/artifacts"

# ── Services (list all microservices in your codebase) ───────────────────────
# One entry per top-level directory under source_dir.
# These are used for service-aware retrieval stratification.
services:
  - payment-core        # example: core transaction orchestrator
  - api-gateway         # example: external-facing API gateway
  - order-service       # example: order management
  - data-layer          # example: shared persistence / ORM library
  - fraud-service       # example: risk and fraud detection

# ── Service profiles (optional but recommended for large codebases) ───────────
# role:           orchestrator | connector | entry_point | persistence | worker
# traffic_weight: 0.0–1.0 — relative production importance.
#                 High-traffic services score higher in retrieval.
#                 Set to 0.3 for services with low/no traffic in target region.
# region:         any label — used as metadata in summaries and retrieval context
service_profiles:
  payment-core:
    role:           orchestrator
    traffic_weight: 1.0
    region:         global
    description:    "Owns transaction lifecycle. Every payment passes through here."
  api-gateway:
    role:           connector
    traffic_weight: 0.85
    region:         global
    description:    "External-facing API layer. High production traffic."
  order-service:
    role:           entry_point
    traffic_weight: 0.75
    region:         global
    description:    "Order management. Routes to payment-core for transaction processing."
  data-layer:
    role:           persistence
    traffic_weight: 0.65
    region:         global
    description:    "Shared data access layer. All services depend on this."
  fraud-service:
    role:           worker
    traffic_weight: 0.40
    region:         global
    description:    "Risk and fraud detection."

# ── Keyword allowlist (short domain terms that bypass the stopword filter) ────
# Add any terms shorter than 4 chars or domain-specific abbreviations
# that should never be filtered from keyword search.
# Examples for a fintech platform:
kw_allowlist:
  - upi    # payment method
  - emi    # instalment plan
  - cvv    # card security
  - otp    # one-time password
  - kyc    # know your customer
  - bnpl   # buy now pay later
  # Add your own domain terms here

# ── Persona overrides (optional) ────────────────────────────────────────────
