# Author alias mapping for HyperRetrieval
# Generated by: python3 build/01b_detect_author_aliases.py
# Copy to config/author_aliases.yaml and review before use.

# Maps variant emails to their canonical email.
# When building ownership index, all variant emails are resolved
# to their canonical form before counting.
aliases:
  john.doe@personal.com: john@company.com
  jdoe@old-company.com: john@company.com

# Canonical email to display name mapping.
display_names:
  john@company.com: "John Doe"

# Emails to exclude from ownership (bots, CI, placeholders).
exclude:
  - dependabot[bot]@users.noreply.github.com
  - noreply@github.com
